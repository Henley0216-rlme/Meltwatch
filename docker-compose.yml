version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: meltwatch-db
    environment:
      POSTGRES_USER: reviewpulse
      POSTGRES_PASSWORD: ${DB_PASSWORD:-meltwatch_secret}
      POSTGRES_DB: meltwatch
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reviewpulse"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: meltwatch-backend
    environment:
      DATABASE_URL: postgresql://reviewpulse:${DB_PASSWORD:-meltwatch_secret}@db:5432/meltwatch
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      EMOTION_MODEL: ${EMOTION_MODEL:-uer/roberta-base-finetuned-dianping-chinese}
      USE_LOCAL_MODEL: "true"
      FLASK_ENV: production
      ZHIPU_API_KEY: ${ZHIPU_API_KEY:-faf1c88decd0412baf19ca089a40e2ff.O2fYoexoVFY7VtuZ}
    env_file:
      - ./backend/.env
    ports:
      - "5001:5000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - model_cache:/root/.cache/huggingface
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: nginx:alpine
    container_name: meltwatch-frontend
    ports:
      - "8080:80"
    volumes:
      - ./meltwatch/dist:/usr/share/nginx/html:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  model_cache:
