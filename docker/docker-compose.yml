# Docker Compose 配置

services:
  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: emotion-widget-api
    ports:
      - "5000:5000"
    environment:
      - USE_LOCAL_MODEL=true
      - FLASK_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: nginx:alpine
    container_name: emotion-widget-frontend
    ports:
      - "8080:80"
    volumes:
      - ../frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped