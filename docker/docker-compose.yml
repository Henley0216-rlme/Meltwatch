services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: reviewpulse-api
    ports:
      - "5001:5000"
    environment:
      - USE_LOCAL_MODEL=true
      - FLASK_ENV=production
    volumes:
      - db_data:/app/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: nginx:alpine
    container_name: meltwatch-frontend
    ports:
      - "8080:80"
    volumes:
      - ../meltwatch:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
