<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="url(#grad1)"/>
  
  <!-- Pulse rings -->
  <circle cx="100" cy="100" r="70" fill="none" stroke="white" stroke-width="2" opacity="0.3">
    <animate attributeName="r" values="70;85;70" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.1;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="100" cy="100" r="70" fill="none" stroke="white" stroke-width="2" opacity="0.3">
    <animate attributeName="r" values="70;85;70" dur="2s" begin="0.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.1;0.3" dur="2s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Radar/signal lines -->
  <g stroke="white" stroke-width="2" stroke-linecap="round" filter="url(#glow)">
    <line x1="100" y1="100" x2="100" y2="45" opacity="0.8"/>
    <line x1="100" y1="100" x2="148" y2="70" opacity="0.6"/>
    <line x1="100" y1="100" x2="148" y2="130" opacity="0.4"/>
    <line x1="100" y1="100" x2="52" y2="130" opacity="0.4"/>
    <line x1="100" y1="100" x2="52" y2="70" opacity="0.6"/>
  </g>
  
  <!-- Center dot -->
  <circle cx="100" cy="100" r="8" fill="white"/>
  
  <!-- Signal points -->
  <circle cx="100" cy="52" r="4" fill="white">
    <animate attributeName="r" values="4;6;4" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="142" cy="72" r="4" fill="white" opacity="0.8">
    <animate attributeName="r" values="4;6;4" dur="1.5s" begin="0.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="142" cy="128" r="4" fill="white" opacity="0.6">
    <animate attributeName="r" values="4;6;4" dur="1.5s" begin="0.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="58" cy="128" r="4" fill="white" opacity="0.6">
    <animate attributeName="r" values="4;6;4" dur="1.5s" begin="0.9s" repeatCount="indefinite"/>
  </circle>
  <circle cx="58" cy="72" r="4" fill="white" opacity="0.8">
    <animate attributeName="r" values="4;6;4" dur="1.5s" begin="1.2s" repeatCount="indefinite"/>
  </circle>
</svg>