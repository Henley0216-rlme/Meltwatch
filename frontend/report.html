<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReviewPulse - 雅鹿品牌用户评价分析报告</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --secondary: #06b6d4;
      --dark: #0f172a;
      --gray-900: #1e293b;
      --gray-700: #334155;
      --gray-500: #64748b;
      --gray-300: #cbd5e1;
      --gray-100: #f1f5f9;
      --gray-50: #f8fafc;
      --white: #ffffff;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --gradient: linear-gradient(135deg, var(--primary), var(--secondary));
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--gray-700);
      line-height: 1.6;
      background: var(--gray-50);
    }
    .nav {
      position: fixed; top: 0; left: 0; right: 0; height: 72px;
      background: rgba(255,255,255,0.95); backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(0,0,0,0.05); z-index: 1000;
      display: flex; align-items: center; padding: 0 60px;
    }
    .nav-brand {
      font-size: 24px; font-weight: 800; color: var(--dark);
      text-decoration: none; display: flex; align-items: center; gap: 10px;
    }
    .logo-main {
      width: 40px; height: 40px; background: var(--gradient);
      border-radius: 12px; display: flex; align-items: center;
      justify-content: center; font-size: 22px;
    }
    .nav-links { display: flex; gap: 32px; margin-left: 60px; }
    .nav-links a {
      color: var(--gray-500); text-decoration: none; font-size: 15px;
      font-weight: 500; cursor: pointer; transition: all 0.3s;
    }
    .nav-links a:hover, .nav-links a.active { color: var(--primary); }
    .container { max-width: 1400px; margin: 0 auto; padding: 92px 60px 60px; }
    .page-header {
      margin-bottom: 30px;
    }
    .page-header h1 {
      font-size: 28px; font-weight: 800; color: var(--dark); margin-bottom: 8px;
    }
    .page-header p { color: var(--gray-500); font-size: 15px; }
    .stats-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px;
    }
    .stat-card {
      background: var(--white); border-radius: 16px; padding: 24px;
      transition: all 0.3s; border: 1px solid transparent;
    }
    .stat-card:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(0,0,0,0.08); }
    .stat-card .icon {
      width: 48px; height: 48px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; margin-bottom: 16px;
    }
    .stat-card .icon.blue { background: rgba(99,102,241,0.1); }
    .stat-card .icon.green { background: rgba(16,185,129,0.1); }
    .stat-card .icon.red { background: rgba(239,68,68,0.1); }
    .stat-card .icon.orange { background: rgba(245,158,11,0.1); }
    .stat-card .number { font-size: 32px; font-weight: 800; color: var(--dark); margin-bottom: 4px; }
    .stat-card .label { font-size: 14px; color: var(--gray-500); }
    .card {
      background: var(--white); border-radius: 16px; overflow: hidden; margin-bottom: 24px;
    }
    .card-header {
      padding: 20px 24px; border-bottom: 1px solid var(--gray-100);
      display: flex; align-items: center; justify-content: space-between;
    }
    .card-header h3 {
      font-size: 16px; font-weight: 700; color: var(--dark);
      display: flex; align-items: center; gap: 8px;
    }
    .card-body { padding: 24px; }
    .source-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
    .source-card {
      background: var(--white); border-radius: 16px; padding: 24px;
      border: 2px solid var(--gray-100); cursor: pointer; transition: all 0.2s;
    }
    .source-card:hover { border-color: var(--primary); transform: translateY(-2px); }
    .source-card.active { border-color: var(--primary); background: rgba(99,102,241,0.03); }
    .source-card .source-icon { font-size: 32px; margin-bottom: 12px; }
    .source-card .source-name { font-size: 16px; font-weight: 700; color: var(--dark); margin-bottom: 4px; }
    .source-card .source-stats { font-size: 13px; color: var(--gray-500); }
    .source-card .source-bar {
      height: 8px; background: var(--gray-100); border-radius: 4px;
      overflow: hidden; margin-top: 12px;
    }
    .source-card .source-bar-fill {
      height: 100%; border-radius: 4px; transition: width 0.8s;
    }
    .source-card .source-bar-fill.positive { background: var(--success); }
    .sentiment-tag {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600;
    }
    .sentiment-tag.positive { background: rgba(16,185,129,0.1); color: var(--success); }
    .sentiment-tag.negative { background: rgba(239,68,68,0.1); color: var(--danger); }
    .results-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .results-table th {
      background: var(--gray-100); padding: 12px 8px; text-align: left;
      font-weight: 600; color: var(--gray-700); position: sticky; top: 0;
    }
    .results-table td { padding: 10px 8px; border-bottom: 1px solid var(--gray-100); }
    .results-table tr:hover { background: var(--gray-50); }
    .results-table .text-cell {
      max-width: 400px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .table-container { max-height: 500px; overflow-y: auto; }
    .chart-container {
      display: flex; gap: 30px; align-items: center; justify-content: center; padding: 20px;
    }
    .donut-chart {
      position: relative; width: 180px; height: 180px;
    }
    .donut-chart svg { width: 100%; height: 100%; transform: rotate(-90deg); }
    .donut-chart .center-text {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      text-align: center;
    }
    .donut-chart .center-text .number { font-size: 28px; font-weight: 800; color: var(--dark); }
    .donut-chart .center-text .label { font-size: 12px; color: var(--gray-500); }
    .chart-legend { display: flex; flex-direction: column; gap: 12px; }
    .legend-item { display: flex; align-items: center; gap: 10px; font-size: 14px; }
    .legend-dot { width: 12px; height: 12px; border-radius: 50%; }
    .legend-dot.positive { background: var(--success); }
    .legend-dot.negative { background: var(--danger); }
    .filter-bar {
      display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;
    }
    .filter-btn {
      padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 600;
      background: var(--gray-100); border: none; color: var(--gray-700);
      cursor: pointer; transition: all 0.2s;
    }
    .filter-btn:hover { background: var(--gray-200); }
    .filter-btn.active { background: var(--primary); color: white; }
    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      color: var(--primary); text-decoration: none; font-size: 14px; font-weight: 600;
    }
    @media (max-width: 1200px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .source-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 768px) {
      .container { padding: 92px 20px 40px; }
      .nav { padding: 0 20px; }
      .stats-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <a class="nav-brand" href="index.html">
      <div class="logo-main">📡</div>
      ReviewPulse
    </a>
    <div class="nav-links">
      <a href="index.html">📊 分析中心</a>
      <a class="active">📋 爬虫数据报告</a>
    </div>
  </nav>

  <div class="container">
    <div class="page-header">
      <a href="index.html" class="back-link">← 返回分析中心</a>
      <h1 style="margin-top: 16px;">雅鹿品牌用户评价分析报告</h1>
      <p>基于淘宝评论、小红书笔记、店铺商品数据的综合情感分析</p>
    </div>

    <!-- Summary Stats -->
    <div class="stats-grid" id="statsGrid"></div>

    <!-- Source Cards -->
    <div class="source-grid" id="sourceGrid"></div>

    <!-- Chart -->
    <div class="card">
      <div class="card-header">
        <h3>📊 情感分布概览</h3>
      </div>
      <div class="card-body">
        <div class="chart-container" id="chartContainer"></div>
      </div>
    </div>

    <!-- Detail Tables -->
    <div class="card" id="taobaoCard">
      <div class="card-header">
        <h3>🛒 淘宝评论分析详情</h3>
        <div class="filter-bar" id="taobaoFilter"></div>
      </div>
      <div class="card-body">
        <div class="table-container">
          <table class="results-table">
            <thead>
              <tr>
                <th>#</th>
                <th>评论内容</th>
                <th>商品</th>
                <th>评论人</th>
                <th>时间</th>
                <th>情感</th>
                <th>置信度</th>
              </tr>
            </thead>
            <tbody id="taobaoBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="card" id="xhsCard">
      <div class="card-header">
        <h3>📱 小红书笔记分析详情</h3>
        <div class="filter-bar" id="xhsFilter"></div>
      </div>
      <div class="card-body">
        <div class="table-container">
          <table class="results-table">
            <thead>
              <tr>
                <th>#</th>
                <th>标题</th>
                <th>作者</th>
                <th>点赞</th>
                <th>时间</th>
                <th>情感</th>
                <th>置信度</th>
              </tr>
            </thead>
            <tbody id="xhsBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="card" id="shopCard">
      <div class="card-header">
        <h3>🏪 店铺商品分析详情</h3>
        <div class="filter-bar" id="shopFilter"></div>
      </div>
      <div class="card-body">
        <div class="table-container">
          <table class="results-table">
            <thead>
              <tr>
                <th>#</th>
                <th>商品名称</th>
                <th>情感</th>
                <th>置信度</th>
              </tr>
            </thead>
            <tbody id="shopBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    let reportData = null;

    async function loadData() {
      try {
        const resp = await fetch('report_data.json');
        reportData = await resp.json();
        renderAll();
      } catch (e) {
        console.error('Failed to load report data:', e);
        document.querySelector('.container').innerHTML += '<div style="text-align:center;padding:40px;color:var(--danger);">加载数据失败，请确保 report_data.json 存在</div>';
      }
    }

    function renderAll() {
      renderStats();
      renderSourceCards();
      renderChart();
      renderTaobao();
      renderXiaohongshu();
      renderShop();
    }

    function renderStats() {
      const s = reportData.summary;
      const positiveRate = (s.positive / s.total * 100).toFixed(1);
      const negativeRate = (s.negative / s.total * 100).toFixed(1);
      document.getElementById('statsGrid').innerHTML = `
        <div class="stat-card">
          <div class="icon blue">📝</div>
          <div class="number">${s.total.toLocaleString()}</div>
          <div class="label">分析总数</div>
        </div>
        <div class="stat-card">
          <div class="icon green">😊</div>
          <div class="number">${positiveRate}%</div>
          <div class="label">正面评价占比</div>
        </div>
        <div class="stat-card">
          <div class="icon red">😞</div>
          <div class="number">${negativeRate}%</div>
          <div class="label">负面评价占比</div>
        </div>
        <div class="stat-card">
          <div class="icon orange">📦</div>
          <div class="number">3</div>
          <div class="label">数据源</div>
        </div>
      `;
    }

    function renderSourceCards() {
      const sources = reportData.sources;
      const icons = { taobao: '🛒', xiaohongshu: '📱', shop: '🏪' };
      let html = '';
      for (const [key, src] of Object.entries(sources)) {
        const rate = (src.positive / src.total * 100).toFixed(1);
        html += `
          <div class="source-card" onclick="scrollToCard('${key}')">
            <div class="source-icon">${icons[key] || '📊'}</div>
            <div class="source-name">${src.label}</div>
            <div class="source-stats">${src.total} 条 | 正面 ${src.positive} | 负面 ${src.negative}</div>
            <div class="source-bar">
              <div class="source-bar-fill positive" style="width: ${rate}%"></div>
            </div>
            <div style="font-size:12px;color:var(--success);margin-top:6px;font-weight:600;">正面率 ${rate}%</div>
          </div>
        `;
      }
      document.getElementById('sourceGrid').innerHTML = html;
    }

    function renderChart() {
      const sources = reportData.sources;
      const colors = { taobao: '#6366f1', xiaohongshu: '#06b6d4', shop: '#f59e0b' };
      const total = reportData.summary.total;

      let offset = 0;
      let circles = '';
      let legends = '';
      const circumference = 2 * Math.PI * 70;

      for (const [key, src] of Object.entries(sources)) {
        const pct = src.total / total;
        const dashLen = pct * circumference;
        const dashOffset = -offset * circumference;
        circles += `<circle cx="90" cy="90" r="70" fill="none" stroke="${colors[key]}" stroke-width="24" stroke-dasharray="${dashLen} ${circumference - dashLen}" stroke-dashoffset="${dashOffset}" />`;
        legends += `
          <div class="legend-item">
            <div class="legend-dot" style="background:${colors[key]}"></div>
            <span><strong>${src.label}</strong> ${src.total} 条 (${(pct*100).toFixed(1)}%)</span>
          </div>
        `;
        offset += pct;
      }

      const s = reportData.summary;
      const posRate = (s.positive / s.total * 100).toFixed(1);

      document.getElementById('chartContainer').innerHTML = `
        <div class="donut-chart">
          <svg viewBox="0 0 180 180">${circles}</svg>
          <div class="center-text">
            <div class="number">${posRate}%</div>
            <div class="label">正面率</div>
          </div>
        </div>
        <div class="chart-legend">
          ${legends}
          <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--gray-100);">
            <div class="legend-item">
              <div class="legend-dot positive"></div>
              <span>正面 ${s.positive} 条</span>
            </div>
            <div class="legend-item" style="margin-top:8px;">
              <div class="legend-dot negative"></div>
              <span>负面 ${s.negative} 条</span>
            </div>
          </div>
        </div>
      `;
    }

    function createFilterBar(containerId, data, renderFn) {
      const container = document.getElementById(containerId);
      container.innerHTML = `
        <button class="filter-btn active" onclick="filterData('${containerId}', 'all', '${renderFn}')">全部</button>
        <button class="filter-btn" onclick="filterData('${containerId}', 'positive', '${renderFn}')">😊 正面</button>
        <button class="filter-btn" onclick="filterData('${containerId}', 'negative', '${renderFn}')">😞 负面</button>
      `;
    }

    let currentFilters = { taobaoFilter: 'all', xhsFilter: 'all', shopFilter: 'all' };

    function filterData(containerId, filter, renderFn) {
      currentFilters[containerId] = filter;
      document.querySelectorAll(`#${containerId} .filter-btn`).forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');
      window[renderFn]();
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function renderTaobao() {
      createFilterBar('taobaoFilter', reportData.taobao_details, 'renderTaobao');
      const filter = currentFilters.taobaoFilter;
      let data = reportData.taobao_details;
      if (filter === 'positive') data = data.filter(r => r.sentiment === '正面');
      if (filter === 'negative') data = data.filter(r => r.sentiment === '负面');

      document.getElementById('taobaoBody').innerHTML = data.map((r, i) => `
        <tr>
          <td>${i + 1}</td>
          <td class="text-cell" title="${escapeHtml(r.text)}">${escapeHtml(r.text.substring(0, 60))}${r.text.length > 60 ? '...' : ''}</td>
          <td style="font-size:12px;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${escapeHtml(r.product)}">${escapeHtml((r.product || '').substring(0, 20))}</td>
          <td>${escapeHtml(r.reviewer || '')}</td>
          <td style="font-size:12px;">${r.time || ''}</td>
          <td><span class="sentiment-tag ${r.sentiment === '正面' ? 'positive' : 'negative'}">${r.icon} ${r.sentiment === '正面' ? '满意' : '不满'}</span></td>
          <td>${r.confidence || ''}</td>
        </tr>
      `).join('');
    }

    function renderXiaohongshu() {
      createFilterBar('xhsFilter', reportData.xiaohongshu_details, 'renderXiaohongshu');
      const filter = currentFilters.xhsFilter;
      let data = reportData.xiaohongshu_details;
      if (filter === 'positive') data = data.filter(r => r.sentiment === '正面');
      if (filter === 'negative') data = data.filter(r => r.sentiment === '负面');

      document.getElementById('xhsBody').innerHTML = data.map((r, i) => `
        <tr>
          <td>${i + 1}</td>
          <td class="text-cell" title="${escapeHtml(r.text)}">${escapeHtml(r.text.substring(0, 50))}${r.text.length > 50 ? '...' : ''}</td>
          <td>${escapeHtml(r.author || '')}</td>
          <td>${r.likes || ''}</td>
          <td style="font-size:12px;">${r.time || ''}</td>
          <td><span class="sentiment-tag ${r.sentiment === '正面' ? 'positive' : 'negative'}">${r.icon} ${r.sentiment === '正面' ? '满意' : '不满'}</span></td>
          <td>${r.confidence || ''}</td>
        </tr>
      `).join('');
    }

    function renderShop() {
      createFilterBar('shopFilter', reportData.shop_details, 'renderShop');
      const filter = currentFilters.shopFilter;
      let data = reportData.shop_details;
      if (filter === 'positive') data = data.filter(r => r.sentiment === '正面');
      if (filter === 'negative') data = data.filter(r => r.sentiment === '负面');

      document.getElementById('shopBody').innerHTML = data.map((r, i) => `
        <tr>
          <td>${i + 1}</td>
          <td class="text-cell" title="${escapeHtml(r.text)}">${escapeHtml(r.text.substring(0, 60))}${r.text.length > 60 ? '...' : ''}</td>
          <td><span class="sentiment-tag ${r.sentiment === '正面' ? 'positive' : 'negative'}">${r.icon} ${r.sentiment === '正面' ? '满意' : '不满'}</span></td>
          <td>${r.confidence || ''}</td>
        </tr>
      `).join('');
    }

    function scrollToCard(key) {
      const map = { taobao: 'taobaoCard', xiaohongshu: 'xhsCard', shop: 'shopCard' };
      document.getElementById(map[key])?.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    loadData();
  </script>
</body>
</html>
